<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detection</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            width: 60%;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        textarea {
            width: 90%;
            height: 150px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            margin-top: 15px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>📰 Fake News Detector</h1>

        <form method="POST" action="/predict">
            <textarea name="news" placeholder="Enter news text here..."></textarea>
            <br>
            <button type="submit">Check News</button>
        </form>

        {% if prediction %}
            <div class="result">
                Result: {{ prediction }}
            </div>

            <p><b>Input:</b> {{ news }}</p>
        {% endif %}

    </div>

</body>
</html>
